<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso - Monitor Áudio Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="logo">MONITOR<span>AUDIO</span></div>
            <h2>Identificação</h2>
            <p>Insira suas credenciais de acesso</p>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="username" placeholder="E-mail ou Usuário" required inputmode="email">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" id="btn-login">
                    <span class="btn-text">ENTRAR</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div id="error-msg" class="hidden"></div>
            
            <div class="footer-links">
                <p>Sua assinatura expirou?</p>
                <a href="https://wa.me/5585996040748?text=Olá!%20Meu%20acesso%20expirou%20e%20gostaria%20de%20fazer%20a%20renovação%20do%20meu%20plano." target="_blank">
                    <i class="fab fa-whatsapp"></i> RENOVAR ACESSO AGORA
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
